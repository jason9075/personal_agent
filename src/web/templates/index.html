<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>personal_agent — Workflow</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.18/css/litegraph.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<!-- Header -->
<header id="app-header">
  <span class="logo">personal_agent</span>
  <span id="graph-badge" class="badge"></span>
  <div class="header-actions">
    <button id="btn-add-node"  class="btn btn-primary">+ Node</button>
    <button id="btn-add-edge"  class="btn btn-secondary" title="Click, then drag from one node to another">↗ Edge</button>
    <button id="btn-reload"    class="btn btn-ghost">↺ Reload</button>
  </div>
</header>

<!-- Main layout -->
<div id="layout">

  <!-- LiteGraph canvas -->
  <div id="canvas-wrap">
    <canvas id="lg-canvas"></canvas>
  </div>

  <!-- Side panel -->
  <aside id="side-panel">

    <div id="panel-tabs">
      <button class="tab-btn active" data-tab="editor">Editor</button>
      <button class="tab-btn"        data-tab="skills">Skills</button>
    </div>

    <!-- Editor tab -->
    <div id="tab-editor" class="tab-body">

      <div id="editor-hint" class="panel-hint">
        <p>Select a node to edit its skill.</p>
        <p class="muted">Right-click a connection to edit its condition.</p>
      </div>

      <!-- Node + skill editor (shown when node selected) -->
      <div id="node-editor" class="hidden">

        <!-- Node section -->
        <section>
          <h4>Node</h4>
          <div class="kv-row"><span>ID</span><code id="ne-node-id"></code></div>
          <div class="kv-row"><span>Pass</span><span id="ne-pass" class="badge-pass"></span></div>
          <div class="kv-row"><span>Skill</span><code id="ne-skill-id"></code></div>
          <div class="kv-row">
            <span>Enabled</span>
            <label class="toggle"><input type="checkbox" id="ne-enabled"><span class="slider"></span></label>
          </div>
          <div class="btn-row">
            <button id="ne-save"   class="btn btn-primary btn-sm">Save Node</button>
            <button id="ne-delete" class="btn btn-danger  btn-sm">Delete</button>
          </div>
        </section>

        <hr>

        <!-- Skill section -->
        <section>
          <h4>Skill — <code id="se-id-label"></code></h4>

          <label class="field-label">Display Name</label>
          <input type="text" id="se-display-name">

          <label class="field-label">Description <span class="muted">(used by LLM router)</span></label>
          <textarea id="se-description" rows="3"></textarea>

          <label class="field-label">Router Mode</label>
          <select id="se-router-mode">
            <option value="direct_regex">direct_regex — regex patterns</option>
            <option value="llm">llm — LLM router</option>
            <option value="always">always — auto-activate</option>
          </select>

          <div id="se-patterns-wrap">
            <label class="field-label">
              Router Patterns
              <span class="muted">one per line · use named groups <code>(?P&lt;key&gt;...)</code></span>
            </label>
            <textarea id="se-patterns" rows="4" spellcheck="false"></textarea>
          </div>

          <label class="field-label">Pass 2 Mode</label>
          <select id="se-pass2-mode">
            <option value="never">never — return stdout directly</option>
            <option value="always">always — LLM synthesis</option>
            <option value="optional">optional — skill-specific logic</option>
          </select>

          <label class="field-label">Script Path <span class="muted">(relative to repo root)</span></label>
          <input type="text" id="se-script-path" spellcheck="false">

          <label class="field-label">System Prompt <span class="muted">(optional, for LLM skills)</span></label>
          <textarea id="se-system-prompt" rows="5" spellcheck="false"></textarea>

          <div class="btn-row">
            <button id="se-save" class="btn btn-primary btn-sm">Save Skill</button>
          </div>
        </section>

      </div><!-- /node-editor -->

      <!-- Edge editor (shown when edge right-clicked) -->
      <div id="edge-editor" class="hidden">
        <section>
          <h4>Connection</h4>
          <div class="kv-row"><span>From</span><code id="ee-from"></code></div>
          <div class="kv-row"><span>To</span><code id="ee-to"></code></div>

          <label class="field-label">Condition Type</label>
          <select id="ee-cond-type">
            <option value="always">always</option>
            <option value="returncode_eq">returncode_eq</option>
            <option value="output_contains">output_contains</option>
          </select>

          <div id="ee-value-wrap">
            <label class="field-label">Value <span class="muted">(e.g. 0 or a substring)</span></label>
            <input type="text" id="ee-cond-value">
          </div>

          <div class="btn-row">
            <button id="ee-save"   class="btn btn-primary btn-sm">Save</button>
            <button id="ee-delete" class="btn btn-danger  btn-sm">Delete</button>
          </div>
        </section>
      </div><!-- /edge-editor -->

    </div><!-- /tab-editor -->

    <!-- Skills tab -->
    <div id="tab-skills" class="tab-body hidden">
      <p class="panel-hint muted">All defined skills. Click to edit.</p>
      <div id="skills-list"></div>
    </div>

  </aside>
</div><!-- /layout -->

<!-- Add-node modal -->
<div id="modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-box">
    <h3>Add Node</h3>

    <label class="field-label">Skill</label>
    <select id="modal-skill"></select>

    <label class="field-label">Pass Index</label>
    <input type="number" id="modal-pass" min="1" max="20" value="1">

    <label class="field-label">Node ID <span class="muted">(auto-generated)</span></label>
    <input type="text" id="modal-node-id" spellcheck="false">

    <div class="btn-row" style="margin-top:16px">
      <button id="modal-confirm" class="btn btn-primary">Add</button>
      <button id="modal-cancel"  class="btn btn-ghost">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.18/build/litegraph.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
